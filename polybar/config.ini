[colors]
background = #050505
foreground = #f2f2f2
muted = #8d8d8d
border = #202020
panel = #0d0d0d
panel_alt = #111111
accent = #d9d9d9

[bar/alpenglowed]
width = 100%
height = 34
offset-x = 0
offset-y = 0
radius = 0
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
border-size = 0
padding-left = 1
padding-right = 1
module-margin = 0
font-0 = Cantarell:size=11;2
font-1 = Noto Sans:size=10;2
modules-left = brand mode
modules-center = date
modules-right = battery load memory backend
override-redirect = true

[module/brand]
type = custom/text
content = " alpenglowed "
content-background = ${colors.panel}
content-foreground = ${colors.foreground}
content-padding = 1

[module/mode]
type = custom/script
exec = /home/undivisible/projects/alpenglowed/target/debug/alpenglowed --polybar-module=mode
interval = 2
label = " %output% "
label-background = ${colors.panel_alt}
label-foreground = ${colors.muted}
label-padding = 1

[module/date]
type = internal/date
interval = 1
date = Tue Jun 23  12:34
time = %a %b %e  %H:%M
label = " %time% "
label-background = ${colors.panel}
label-foreground = ${colors.foreground}
label-padding = 1

[module/battery]
type = custom/script
exec = /home/undivisible/projects/alpenglowed/target/debug/alpenglowed --polybar-module=battery
interval = 15
label = " pow %output% "
label-background = ${colors.panel_alt}
label-foreground = ${colors.foreground}
label-padding = 1

[module/load]
type = custom/script
exec = /home/undivisible/projects/alpenglowed/target/debug/alpenglowed --polybar-module=load
interval = 5
label = " load %output% "
label-background = ${colors.panel}
label-foreground = ${colors.foreground}
label-padding = 1

[module/memory]
type = custom/script
exec = /home/undivisible/projects/alpenglowed/target/debug/alpenglowed --polybar-module=memory
interval = 5
label = " mem %output% "
label-background = ${colors.panel_alt}
label-foreground = ${colors.foreground}
label-padding = 1

[module/backend]
type = custom/script
exec = /home/undivisible/projects/alpenglowed/target/debug/alpenglowed --polybar-module=backend
interval = 5
label = " wl %output% "
label-background = ${colors.panel}
label-foreground = ${colors.muted}
label-padding = 1
