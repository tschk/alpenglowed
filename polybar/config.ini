[colors]
background = #050505
foreground = #e8e8e8
muted = #8a8a8a
border = #2b2b2b

[bar/alpenglowed]
width = 100%
height = 30
offset-x = 0
offset-y = 0
radius = 0
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
border-size = 1
border-color = ${colors.border}
padding-left = 1
padding-right = 1
module-margin = 1
font-0 = monospace:size=10;2
modules-left = brand mode
modules-center = date
modules-right = battery load memory backend
override-redirect = true

[module/brand]
type = custom/text
content = alpenglowed
content-foreground = ${colors.foreground}

[module/mode]
type = custom/script
exec = /home/undivisible/projects/alpenglowed/target/debug/alpenglowed --polybar-module=mode
interval = 2
label = %output%
label-foreground = ${colors.muted}

[module/date]
type = internal/date
interval = 1
date = %a %b %e  %H:%M
label = %date%

[module/battery]
type = custom/script
exec = /home/undivisible/projects/alpenglowed/target/debug/alpenglowed --polybar-module=battery
interval = 15
label = pow %output%

[module/load]
type = custom/script
exec = /home/undivisible/projects/alpenglowed/target/debug/alpenglowed --polybar-module=load
interval = 5
label = load %output%

[module/memory]
type = custom/script
exec = /home/undivisible/projects/alpenglowed/target/debug/alpenglowed --polybar-module=memory
interval = 5
label = mem %output%

[module/backend]
type = custom/script
exec = /home/undivisible/projects/alpenglowed/target/debug/alpenglowed --polybar-module=backend
interval = 5
label = wl %output%
